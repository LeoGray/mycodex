name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ensure-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --title "${GITHUB_REF_NAME}" --notes ""

  build-release:
    needs: ensure-release
    if: always() && (needs.ensure-release.result == 'success' || needs.ensure-release.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add x86_64-unknown-linux-musl

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ runner.os }}-x86_64-unknown-linux-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-${{ runner.os }}-x86_64-unknown-linux-musl-
            release-${{ runner.os }}-

      - name: Run tests
        run: cargo test

      - name: Package release archive
        run: ./scripts/package-release.sh --target x86_64-unknown-linux-musl

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mycodex-x86_64-unknown-linux-musl
          path: dist/mycodex-x86_64-unknown-linux-musl.tar.gz
          if-no-files-found: error

      - name: Upload to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" "dist/mycodex-x86_64-unknown-linux-musl.tar.gz" --repo "${GITHUB_REPOSITORY}" --clobber
