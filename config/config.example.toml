[workspace]
root = "/srv/workspace"

[telegram]
bot_token = "123456:replace-me"
allowed_user_id = 123456789
allowed_chat_id = 123456789
poll_timeout_seconds = 30

[codex]
bin = "codex"
# model = "gpt-5.1-codex"

[state]
dir = "/var/lib/mycodex"

[ui]
stream_edit_interval_ms = 1200
max_inline_diff_chars = 6000

[git]
clone_timeout_sec = 600
allow_ssh = true
allow_https = true
