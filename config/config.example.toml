[workspace]
root = "/srv/workspace"

[telegram]
bot_token = "123456:replace-me"
access_mode = "pairing"
poll_timeout_seconds = 30

[app]
enabled = false
bind_addr = "127.0.0.1:3940"
public_base_url = ""
pairing_code_ttl_sec = 600

[codex]
bin = "codex"
# model = "gpt-5.1-codex"
network_access = true

[state]
dir = "/var/lib/mycodex"

[ui]
stream_edit_interval_ms = 1200
max_inline_diff_chars = 6000

[git]
clone_timeout_sec = 600
allow_ssh = true
allow_https = true
